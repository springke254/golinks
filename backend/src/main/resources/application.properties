spring.application.name=golinks

# ===========================================
# Server
# ===========================================
server.port=${SERVER_PORT:8080}

# ===========================================
# Database (PostgreSQL)
# ===========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================================
# Flyway
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===========================================
# RabbitMQ
# ===========================================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT_TLS:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:false}
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP:true}
spring.rabbitmq.listener.direct.auto-startup=${RABBITMQ_LISTENER_DIRECT_AUTO_STARTUP:true}

# ===========================================
# Redis
# ===========================================
spring.data.redis.url=${REDIS_URL}

# ===========================================
# OAuth2 Client (Google)
# ===========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===========================================
# OAuth2 Client (GitHub)
# ===========================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# ===========================================
# JWT (RSA via PKCS12 Keystore)
# ===========================================
app.jwt.keystore-location=classpath:keys/jwt.p12
app.jwt.keystore-password=${JWT_KEYSTORE_PASSWORD}
app.jwt.key-alias=golinks-jwt
app.jwt.key-password=${JWT_KEY_PASSWORD}
app.jwt.access-token-expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.issuer=golinks

# ===========================================
# CORS
# ===========================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===========================================
# App Base URL (for email links)
# ===========================================
app.base-url=${APP_BASE_URL:http://localhost:3000}

# ===========================================
# SMTP Mail
# ===========================================
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${SMTP_FROM:noreply@golinks.io}

# ===========================================
# Cache (Redis)
# ===========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ===========================================
# Actuator
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===========================================
# Logging
# ===========================================
logging.level.com.golinks=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================================
# Rate Limiting (sliding-window, Redis-backed)
# ===========================================
ratelimit.enabled=true

# Auth endpoints (login, signup, forgot/reset password)
ratelimit.auth.max-requests=20
ratelimit.auth.window-seconds=60

# Link creation (POST /api/v1/links)
ratelimit.link-create.max-requests=30
ratelimit.link-create.window-seconds=60

# Redirect (GET /go/{slug})
ratelimit.redirect.max-requests=120
ratelimit.redirect.window-seconds=60

# Password verification for protected links
ratelimit.password-verify.max-requests=5
ratelimit.password-verify.window-seconds=60

# Default for all other endpoints
ratelimit.default.max-requests=200
ratelimit.default.window-seconds=60

# Suspicious client penalty tier
ratelimit.suspicious.max-requests=10
ratelimit.suspicious.window-seconds=60
