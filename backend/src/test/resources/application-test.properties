spring.application.name=golinks-test

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (H2 doesn't support all PostgreSQL features)
spring.flyway.enabled=false

# Disable RabbitMQ and Redis for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT config for tests
app.jwt.keystore-location=classpath:keys/jwt.p12
app.jwt.keystore-password=golinks123
app.jwt.key-alias=golinks-jwt
app.jwt.key-password=golinks123
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.issuer=golinks

# CORS
app.cors.allowed-origins=http://localhost:3000

# Cache
spring.cache.type=simple
